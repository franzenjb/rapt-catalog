document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

u002Fpath><path d=\"M11 20V5\"><\u002Fpath><path d=\"M17 20V14\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-county\" viewBox=\"0 0 24 24\"><path d=\"M9 4 3.5 6.2V20l5.5-2.2 6 2.2 5.5-2.2V4l-5.5 2.2-6-2.2Z\"><\u002Fpath><path d=\"M9 4v13.8\"><\u002Fpath><path d=\"M15 6.2V20\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-census\" viewBox=\"0 0 24 24\"><path d=\"M3.5 3.5h17v17h-17z\"><\u002Fpath><path d=\"M3.5 9.2h17\"><\u002Fpath><path d=\"M3.5 14.8h17\"><\u002Fpath><path d=\"M9.2 3.5v17\"><\u002Fpath><path d=\"M14.8 3.5v17\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-tribal\" viewBox=\"0 0 24 24\"><path d=\"M3.5 20.5h17\"><\u002Fpath><path d=\"M5.5 20.5V10.5\"><\u002Fpath><path d=\"M9.2 20.5V10.5\"><\u002Fpath><path d=\"M14.8 20.5V10.5\"><\u002Fpath><path d=\"M18.5 20.5V10.5\"><\u002Fpath><path d=\"M4 10.5 12 4.5l8 6\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-school\" viewBox=\"0 0 24 24\"><path d=\"M2.5 9 12 4.5 21.5 9 12 13.5Z\"><\u002Fpath><path d=\"M6.5 11.2v4.3c0 1.4 2.8 2.8 5.5 2.8s5.5-1.4 5.5-2.8v-4.3\"><\u002Fpath><path d=\"M21.5 9v4.5\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-transport\" viewBox=\"0 0 24 24\"><path d=\"M6 6.5a2.4 2.4 0 1 0 0-.01Z\"><\u002Fpath><path d=\"M18 17.5a2.4 2.4 0 1 0 0-.01Z\"><\u002Fpath><path d=\"M6.5 9q0 5 5.5 5.5t5.5 5\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-access\" viewBox=\"0 0 24 24\"><path d=\"M12 5.6a1.7 1.7 0 1 0 0-3.3 1.7 1.7 0 0 0 0 3.3Z\"><\u002Fpath><path d=\"M12 6v6.5\"><\u002Fpath><path d=\"M8 8.5h8\"><\u002Fpath><path d=\"M12 12.5 9 20.5\"><\u002Fpath><path d=\"M12 12.5 15 20.5\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-language\" viewBox=\"0 0 24 24\"><path d=\"M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18Z\"><\u002Fpath><path d=\"M3.2 12h17.6\"><\u002Fpath><path d=\"M12 3c2.8 2.5 2.8 15.5 0 18\"><\u002Fpath><path d=\"M12 3c-2.8 2.5-2.8 15.5 0 18\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-digital\" viewBox=\"0 0 24 24\"><path d=\"M4.5 11.5a10 10 0 0 1 15 0\"><\u002Fpath><path d=\"M7.5 14.8a6 6 0 0 1 9 0\"><\u002Fpath><path d=\"M10.5 18a2 2 0 0 1 3 0\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-power\" viewBox=\"0 0 24 24\"><path d=\"M13 2.5 4.5 13.5H11l-1 8 9.5-11.5H13z\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-shelter\" viewBox=\"0 0 24 24\"><path d=\"M3.5 20.5h17\"><\u002Fpath><path d=\"M12 4 3.5 20.5\"><\u002Fpath><path d=\"M12 4l8.5 16.5\"><\u002Fpath><path d=\"M12 11v9.5\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-search\" viewBox=\"0 0 24 24\"><path d=\"M11 4a7 7 0 1 0 0 14 7 7 0 0 0 0-14Z\"><\u002Fpath><path d=\"M20.5 20.5 15.8 15.8\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-pin\" viewBox=\"0 0 24 24\"><path d=\"M12 21.5s6.5-6 6.5-11.5a6.5 6.5 0 1 0-13 0c0 5.5 6.5 11.5 6.5 11.5Z\"><\u002Fpath><path d=\"M12 12.4a2.4 2.4 0 1 0 0-4.8 2.4 2.4 0 0 0 0 4.8Z\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-grid\" viewBox=\"0 0 24 24\"><path d=\"M4 4h6v6H4z\"><\u002Fpath><path d=\"M14 4h6v6h-6z\"><\u002Fpath><path d=\"M4 14h6v6H4z\"><\u002Fpath><path d=\"M14 14h6v6h-6z\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-list\" viewBox=\"0 0 24 24\"><path d=\"M8 6h12\"><\u002Fpath><path d=\"M8 12h12\"><\u002Fpath><path d=\"M8 18h12\"><\u002Fpath><path d=\"M4 6h.01\"><\u002Fpath><path d=\"M4 12h.01\"><\u002Fpath><path d=\"M4 18h.01\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-plus\" viewBox=\"0 0 24 24\"><path d=\"M12 5.5v13\"><\u002Fpath><path d=\"M5.5 12h13\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-check\" viewBox=\"0 0 24 24\"><path d=\"M5 12.5l4.5 4.5L19 6\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"ic-x\" viewBox=\"0 0 24 24\"><path d=\"M6.5 6.5l11 11\"><\u002Fpath><path d=\"M17.5 6.5l-11 11\"><\u002Fpath><\u002Fsymbol>\n<\u002Fsvg>\n\n<div ref=\"{{ rootRef }}\" style=\"height:100vh;display:flex;flex-direction:column;background:var(--page-bg,#fff);font-family:Arial,Helvetica,sans-serif;color:var(--ink,#212529);overflow:hidden\">\n\n  <div style=\"height:var(--topstrip-w,0px);background:var(--topstrip-col,transparent);flex:none\"><\u002Fdiv>\n\n  <header style=\"flex:none;display:flex;align-items:center;gap:20px;padding:0 22px;height:60px;background:var(--header-bg,#fff);color:var(--header-fg,#212529);border-bottom:var(--header-border-w,2px) solid var(--header-border-col,#212529)\">\n    <div style=\"display:flex;align-items:center;gap:11px\">\n      <sc-if value=\"{{ markRedCross }}\" hint-placeholder-val=\"{{ true }}\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\"><rect x=\"9\" y=\"2\" width=\"6\" height=\"20\" rx=\"1\" fill=\"#E21224\"><\u002Frect><rect x=\"2\" y=\"9\" width=\"20\" height=\"6\" rx=\"1\" fill=\"#E21224\"><\u002Frect><\u002Fsvg>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ markFema }}\" hint-placeholder-val=\"{{ false }}\">\n        <span style=\"width:28px;height:28px;border-radius:6px;background:var(--accent,#005ea2);display:flex;align-items:center;justify-content:center\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-all\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n      <\u002Fsc-if>\n      <div style=\"line-height:1.15\">\n        <div style=\"font:700 16px Arial;letter-spacing:0.04em;color:var(--header-fg,#212529)\">RAPT<\u002Fdiv>\n        <div style=\"font:400 11px Arial;color:var(--header-sub,#5A6067)\">{{ brandSub }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <nav style=\"display:flex;gap:6px;align-self:stretch;align-items:center;margin-left:4px\">\n      <div style=\"display:flex;align-items:center;gap:8px;height:100%;padding:0 6px;border-bottom:3px solid var(--accent,#E21224);font:700 14px Arial;color:var(--header-fg,#212529)\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-grid\"><\u002Fuse><\u002Fsvg>Catalog\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;height:100%;padding:0 6px;border-bottom:3px solid transparent;font:400 14px Arial;color:var(--header-sub,#5A6067)\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-pin\"><\u002Fuse><\u002Fsvg>Map\n      <\u002Fdiv>\n    <\u002Fnav>\n    <div style=\"flex:1\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:0;border:1px solid var(--hchip-border,#D7D7D8);border-radius:5px;overflow:hidden\">\n      <sc-for list=\"{{ themeBtns }}\" as=\"t\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ t.onClick }}\" style=\"padding:7px 13px;border:none;background:{{ t.bg }};color:{{ t.fg }};font:700 11px Arial;letter-spacing:0.02em;border-right:1px solid var(--hchip-border,#D7D7D8)\">{{ t.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:9px;padding:7px 14px;border:1px solid var(--hchip-border,#D7D7D8);background:var(--hchip-bg,#fff);border-radius:5px\">\n      <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--accent,#E21224)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-pin\"><\u002Fuse><\u002Fsvg>\n      <span style=\"font:700 13px Arial;color:var(--hchip-fg,#212529)\"><span style=\"font-variant-numeric:tabular-nums\">{{ onMapCount }}<\u002Fspan> on map<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"flex:1;display:flex;min-height:0\">\n\n    <aside class=\"rl\" style=\"width:268px;flex:none;border-right:1px solid var(--rule,#D7D7D8);padding:20px 14px;overflow:auto;background:var(--rail-bg,#fff)\">\n      <div style=\"font:700 11px Arial;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-4,#9F9FA3);margin:0 8px 10px\">Layer groups<\u002Fdiv>\n      <sc-for list=\"{{ domainRows }}\" as=\"d\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ d.onClick }}\" style=\"position:relative;display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:none;background:{{ d.bg }};padding:8px 10px;border-radius:5px;margin-bottom:3px\">\n          <span style=\"position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:3px;background:{{ d.bar }}\"><\u002Fspan>\n          <span style=\"width:32px;height:32px;border-radius:var(--chip-radius,9px);background:{{ d.c }};display:flex;align-items:center;justify-content:center;flex:none\">{{ d.iconEl }}<\u002Fspan>\n          <span style=\"flex:1;font:600 14px Arial;color:var(--ink,#212529)\">{{ d.name }}<\u002Fspan>\n          <span style=\"font:700 12px Arial;color:var(--ink-3,#5A6067);font-variant-numeric:tabular-nums\">{{ d.count }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n\n      <div style=\"height:1px;background:var(--rule,#D7D7D8);margin:16px 8px\"><\u002Fdiv>\n      <div style=\"font:700 11px Arial;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-4,#9F9FA3);margin:0 8px 12px\">Refine<\u002Fdiv>\n      <sc-for list=\"{{ facetGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n        <div style=\"margin-bottom:16px\">\n          <div style=\"font:700 10px Arial;letter-spacing:0.13em;text-transform:uppercase;color:var(--ink-4,#9F9FA3);margin:0 8px 5px\">{{ g.name }}<\u002Fdiv>\n          <sc-for list=\"{{ g.items }}\" as=\"f\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ f.onClick }}\" style=\"display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;background:{{ f.bg }};padding:6px 10px;border-radius:4px;margin-bottom:1px\">\n              {{ f.iconEl }}\n              <span style=\"flex:1;font-size:13px;color:{{ f.color }};font-weight:{{ f.weight }}\">{{ f.label }}<\u002Fspan>\n              <span style=\"font:600 11px Arial;color:var(--ink-4,#9F9FA3);font-variant-numeric:tabular-nums\">{{ f.count }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Faside>\n\n    <main class=\"rl\" style=\"flex:1;min-width:0;overflow:auto;background:var(--page-bg,#fff);display:flex;flex-direction:column\">\n      <div style=\"padding:22px 28px 0\">\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px\">\n          <div style=\"flex:1;position:relative;max-width:620px\">\n            <span style=\"position:absolute;left:15px;top:50%;transform:translateY(-50%);display:flex\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--ink-4,#9F9FA3)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-search\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n            <input value=\"{{ query }}\" oninput=\"{{ onSearch }}\" placeholder=\"Search layers — flood, hospitals, disability, tornado…\" style=\"width:100%;padding:13px 16px 13px 46px;border:1.5px solid var(--input-border,#D7D7D8);border-radius:5px;font:400 15px Arial;color:var(--ink,#212529);background:var(--card-bg,#fff);outline:none\">\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;border:1px solid var(--input-border,#D7D7D8);border-radius:5px;overflow:hidden;flex:none\">\n            <button onclick=\"{{ setGrid }}\" aria-label=\"Grid view\" style=\"display:flex;align-items:center;gap:7px;padding:10px 13px;border:none;background:{{ gridBtnBg }};color:{{ gridBtnFg }};font:700 11px Arial;letter-spacing:0.06em;text-transform:uppercase;border-right:1px solid var(--input-border,#D7D7D8)\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-grid\"><\u002Fuse><\u002Fsvg>Cards\n            <\u002Fbutton>\n            <button onclick=\"{{ setList }}\" aria-label=\"List view\" style=\"display:flex;align-items:center;gap:7px;padding:10px 13px;border:none;background:{{ listBtnBg }};color:{{ listBtnFg }};font:700 11px Arial;letter-spacing:0.06em;text-transform:uppercase\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#ic-list\"><\u002Fuse><\u002Fsvg>List\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasActiveFilters }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ clearAll }}\" style=\"display:flex;align-items:center;gap:7px;border:1px solid var(--input-border,#D7D7D8);background:var(--card-bg,#fff);padding:11px 15px;border-radius:5px;font:700 12px Arial;letter-spacing:0.04em;color:var(--ink-3,#5A6067)\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><use href=\"#ic-x\"><\u002Fuse><\u002Fsvg>Clear filters\n            <\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:22px\">\n          <span style=\"font:700 14px Arial;color:var(--ink,#212529);font-variant-numeric:tabular-nums\">{{ shownCount }} layers<\u002Fspan>\n          <sc-if value=\"{{ filtered }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font:400 13px Arial;color:var(--ink-4,#9F9FA3)\">filtered from <span style=\"font-variant-numeric:tabular-nums\">{{ totalCount }}<\u002Fspan><\u002Fspan><\u002Fsc-if>\n          <div style=\"flex:1\"><\u002Fdiv>\n          <button onclick=\"{{ selectAllShown }}\" style=\"border:none;background:none;font:700 12px Arial;letter-spacing:0.03em;color:var(--accent,#E21224);padding:4px\">{{ selectAllLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;padding:0 28px 24px\">\n        <sc-for list=\"{{ sections }}\" as=\"sec\" hint-placeholder-count=\"3\">\n          <div style=\"margin-bottom:32px\">\n
