<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPT Resource Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1c4063; --navy-d:#15314a; --gold:#bfa23f;
  --ink:#16293a; --body:#3c505f; --muted:#6e8190; --line:#d3dbe3; --canvas:#eef2f6;
  --fb:'Source Sans Pro','Segoe UI',sans-serif; --fd:'IBM Plex Mono',Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--fb);background:var(--navy-d);overflow:hidden;height:100vh;position:relative;-webkit-font-smoothing:antialiased}
#frame{position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff}

/* Hidden toggle sitting over the app's FEMA logo (top-left of the masthead) */
.logotoggle{position:absolute;top:0;left:0;width:235px;height:56px;z-index:40;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:flex-end;padding:0 10px 0 0;transition:.18s}
.logotoggle:hover{background:linear-gradient(90deg,transparent 35%,rgba(191,162,63,.20))}
.logotoggle .chev{color:var(--gold);font-size:12px;line-height:1;opacity:0;transform:translateY(1px);transition:.22s}
.logotoggle:hover .chev,.logotoggle.open .chev{opacity:.95}
.logotoggle.open .chev{transform:rotate(180deg)}

/* Accordion panel — slides down from under the masthead */
.panel{position:absolute;top:56px;left:0;right:0;z-index:30;background:linear-gradient(180deg,#1f4061,#15314a);border-bottom:3px solid var(--gold);box-shadow:0 16px 34px rgba(0,0,0,.4);transform:translateY(-135%);transition:transform .34s cubic-bezier(.2,.8,.2,1)}
.panel.open{transform:translateY(0)}
.panel-inner{padding:15px 28px 17px;position:relative}
.pkick{font-family:var(--fd);font-size:11px;letter-spacing:2px;color:#bcd0e4;font-weight:600}
.ptitle{font-size:19px;font-weight:700;color:#fff;margin:2px 0 2px}
.psub{font-size:13px;color:#cfe0f0}
.pclose{position:absolute;top:12px;right:20px;width:30px;height:30px;border:none;background:rgba(255,255,255,.1);color:#cfe0f0;border-radius:7px;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center}
.pclose:hover{background:rgba(255,255,255,.2);color:#fff}
.tabbar{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.tb{font-family:var(--fb);font-size:14px;font-weight:600;color:#cddae7;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);padding:10px 16px;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:9px;transition:.12s;white-space:nowrap}
.tb:hover{background:rgba(255,255,255,.14);color:#fff}
.tb.active{background:var(--gold);color:#241f08;border-color:var(--gold)}
.tb svg{width:17px;height:17px;flex-shrink:0}
.tb small{font-family:var(--fd);font-size:10px;font-weight:400;letter-spacing:.3px;opacity:.7}

.loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);font-size:14px;font-family:var(--fd);background:var(--canvas);z-index:20;transition:opacity .25s}
.loading.hide{opacity:0;pointer-events:none}
.spin{width:30px;height:30px;border:3px solid #cdd6df;border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){.psub{display:none}.tb small{display:none}.panel-inner{padding:12px 16px 14px}}
</style>
</head>
<body>
  <iframe id="frame" src="https://rapt-catalog.vercel.app/?view=list&open=1" title="RAPT Resource Catalog" loading="eager"></iframe>

  <button class="logotoggle" id="logoTog" title="Design options — click to switch layout" aria-label="Toggle design options">
    <span class="chev">▾</span>
  </button>

  <div class="panel" id="panel" role="region" aria-label="Design options">
    <div class="panel-inner">
      <button class="pclose" id="pClose" title="Close" aria-label="Close design options">&times;</button>
      <div class="pkick">RAPT RESOURCE CATALOG</div>
      <div class="ptitle">Design Options</div>
      <div class="psub">The same 106 RAPT layers, shown three ways. Pick a layout.</div>
      <div class="tabbar" id="tabbar">
        <button class="tb active" data-view="list">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><line x1="4" y1="6" x2="4.01" y2="6"/><line x1="4" y1="12" x2="4.01" y2="12"/><line x1="4" y1="18" x2="4.01" y2="18"/></svg>
          Master-Detail <small>list + preview</small>
        </button>
        <button class="tb" data-view="cards">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7.5" height="7.5" rx="1.4"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.4"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.4"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.4"/></svg>
          Cards <small>visual grid</small>
        </button>
        <button class="tb" data-view="table">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="1.5"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="20"/></svg>
          Table <small>dense rows</small>
        </button>
      </div>
    </div>
  </div>

  <div class="loading" id="loading"><div class="spin"></div>Loading…</div>

<script>
  const BASE='https://rapt-catalog.vercel.app';
  const frame=document.getElementById('frame'), load=document.getElementById('loading');
  const panel=document.getElementById('panel'), logoTog=document.getElementById('logoTog');
  frame.addEventListener('load',()=>load.classList.add('hide'));
  function setOpen(o){panel.classList.toggle('open',o);logoTog.classList.toggle('open',o);}
  logoTog.addEventListener('click',()=>setOpen(!panel.classList.contains('open')));
  document.getElementById('pClose').addEventListener('click',()=>setOpen(false));
  document.getElementById('tabbar').addEventListener('click',e=>{
    const b=e.target.closest('.tb'); if(!b) return;
    document.querySelectorAll('.tb').forEach(t=>t.classList.toggle('active',t===b));
    load.classList.remove('hide');
    frame.src=BASE+'/?view='+b.dataset.view+'&open=1';
  });
</script>
</body>
</html>
