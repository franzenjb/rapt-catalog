<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPT Resource Catalog — Design Options</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1c4063; --navy-d:#15314a; --gold:#bfa23f;
  --ink:#16293a; --body:#3c505f; --muted:#6e8190; --line:#d3dbe3;
  --canvas:#eef2f6;
  --fb:'Source Sans Pro','Segoe UI',sans-serif; --fd:'IBM Plex Mono',Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--fb);color:var(--ink);background:var(--canvas);display:flex;flex-direction:column;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
header{background:linear-gradient(180deg,#1f4061,#15314a);color:#fff;padding:18px 30px 0;flex-shrink:0;border-bottom:3px solid var(--gold)}
.hkick{font-family:var(--fd);font-size:11px;letter-spacing:2px;color:#bcd0e4;font-weight:600}
.htitle{font-size:24px;font-weight:700;margin:4px 0 4px}
.hsub{font-size:14px;color:#cfe0f0;max-width:78ch;line-height:1.5}
.tabbar{display:flex;gap:5px;margin-top:16px}
.tb{font-family:var(--fb);font-size:14px;font-weight:600;color:#cddae7;background:rgba(255,255,255,.06);border:none;border-bottom:3px solid transparent;padding:11px 18px;cursor:pointer;border-radius:7px 7px 0 0;display:flex;align-items:center;gap:9px;transition:.12s;white-space:nowrap}
.tb:hover{background:rgba(255,255,255,.12);color:#fff}
.tb.active{background:var(--canvas);color:var(--navy);border-bottom-color:var(--gold)}
.tb svg{width:17px;height:17px;flex-shrink:0}
.tb small{font-family:var(--fd);font-size:10px;font-weight:400;letter-spacing:.3px;opacity:.7}
.frameWrap{flex:1;position:relative;background:var(--canvas)}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff}
.loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);font-size:14px;font-family:var(--fd);background:var(--canvas);pointer-events:none;transition:opacity .25s}
.loading.hide{opacity:0}
.spin{width:30px;height:30px;border:3px solid #cdd6df;border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){.hsub{display:none}.tb small{display:none}header{padding:14px 16px 0}}
</style>
</head>
<body>
<header>
  <div class="hkick">RAPT RESOURCE CATALOG</div>
  <div class="htitle">Design Options</div>
  <div class="hsub">The same 106 RAPT layers, shown three ways. Click a tab to preview each layout live — then tell us which one fits best.</div>
  <div class="tabbar" id="tabbar">
    <button class="tb active" data-view="list">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><line x1="4" y1="6" x2="4.01" y2="6"/><line x1="4" y1="12" x2="4.01" y2="12"/><line x1="4" y1="18" x2="4.01" y2="18"/></svg>
      Master-Detail <small>list + preview</small>
    </button>
    <button class="tb" data-view="cards">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7.5" height="7.5" rx="1.4"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.4"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.4"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.4"/></svg>
      Cards <small>visual grid</small>
    </button>
    <button class="tb" data-view="table">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="1.5"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="20"/></svg>
      Table <small>dense rows</small>
    </button>
  </div>
</header>
<div class="frameWrap">
  <div class="loading" id="loading"><div class="spin"></div>Loading preview…</div>
  <iframe id="frame" src="/?view=list&open=1" title="Design preview" loading="eager"></iframe>
</div>
<script>
  const frame=document.getElementById('frame'), load=document.getElementById('loading');
  function showLoad(){load.classList.remove('hide');load.style.display='flex';}
  function hideLoad(){load.classList.add('hide');setTimeout(()=>{load.style.display='none';},260);}
  frame.addEventListener('load',hideLoad);
  document.getElementById('tabbar').addEventListener('click',e=>{
    const b=e.target.closest('.tb'); if(!b) return;
    document.querySelectorAll('.tb').forEach(t=>t.classList.toggle('active',t===b));
    showLoad();
    frame.src='/?view='+b.dataset.view+'&open=1';
  });
</script>
</body>
</html>
